services:
  web:
    build:
      context: .
      args:
        - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - BOX_CLIENT_ID=${BOX_CLIENT_ID}
      - BOX_CLIENT_SECRET=${BOX_CLIENT_SECRET}
      - BOX_TOKEN_FILE=/app/box_tokens.json
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./box_tokens.json:/app/box_tokens.json
